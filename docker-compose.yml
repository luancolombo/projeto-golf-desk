services:
  postgres:
    image: postgres:18
    container_name: golf-office-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: golf_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      TZ: UTC
    ports:
      - "5433:5432"
    volumes:
      - golf-office-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d golf_api"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golf-office-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/golf_api
      DB_USERNAME: postgres
      DB_PASSWORD: 123456
      JPA_DDL_AUTO: validate
      JPA_SHOW_SQL: "false"
    ports:
      - "8080:8080"

volumes:
  golf-office-postgres-data:
